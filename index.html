<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HTML, CSS, JavaScript로 만든 웹사이트입니다. 소개와 연락처 정보를 확인해보세요.">
    <meta name="keywords" content="웹사이트, HTML, CSS, JavaScript">
    <meta property="og:title" content="My Site - 환영합니다">
    <meta property="og:description" content="HTML, CSS, JavaScript로 만든 웹사이트입니다.">
    <meta property="og:type" content="website">
    <title>My Site - 환영합니다</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav aria-label="메인 내비게이션">
            <a href="#home" class="logo" aria-label="My Site 홈으로 이동">My Site</a>
            <ul class="nav-links" id="navLinks" role="list">
                <li><a href="#home">홈</a></li>
                <li><a href="#about">소개</a></li>
                <li><a href="#contact">연락처</a></li>
            </ul>
            <button class="hamburger" id="hamburger" aria-label="메뉴 열기" aria-expanded="false" aria-controls="navLinks">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <main>
        <section id="home" class="hero" aria-label="메인 소개">
            <div class="hero-content">
                <h1>안녕하세요!</h1>
                <p>간단한 웹사이트에 오신 것을 환영합니다</p>
                <button class="cta-btn" id="greetBtn">인사하기</button>
            </div>
        </section>

        <section id="about" class="about fade-in-section" aria-label="기술 소개">
            <h2>소개</h2>
            <p class="section-desc">이것은 HTML, CSS, JavaScript로 만든 웹사이트입니다.</p>
            <div class="card-container">
                <div class="card">
                    <span class="card-icon" aria-hidden="true">📄</span>
                    <h3>HTML</h3>
                    <p>구조를 만듭니다</p>
                </div>
                <div class="card">
                    <span class="card-icon" aria-hidden="true">🎨</span>
                    <h3>CSS</h3>
                    <p>스타일을 적용합니다</p>
                </div>
                <div class="card">
                    <span class="card-icon" aria-hidden="true">⚡</span>
                    <h3>JavaScript</h3>
                    <p>상호작용을 추가합니다</p>
                </div>
            </div>
        </section>

        <section id="contact" class="contact fade-in-section" aria-label="연락처 폼">
            <h2>연락처</h2>
            <form id="contactForm" novalidate>
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" placeholder="이름을 입력하세요" required autocomplete="name">
                    <span class="error-msg" id="nameError" role="alert"></span>
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="이메일을 입력하세요" required autocomplete="email">
                    <span class="error-msg" id="emailError" role="alert"></span>
                </div>
                <div class="form-group">
                    <label for="message">메시지</label>
                    <textarea id="message" name="message" placeholder="메시지를 입력하세요" rows="4" required></textarea>
                    <span class="error-msg" id="messageError" role="alert"></span>
                </div>
                <button type="submit" class="submit-btn">
                    <span class="btn-text">보내기</span>
                    <span class="btn-spinner" aria-hidden="true"></span>
                </button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 My Site. All rights reserved.</p>
    </footer>

    <button class="scroll-top" id="scrollTop" aria-label="맨 위로 이동" title="맨 위로">↑</button>

    <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

    <script src="script.js"></script>
</body>
</html>
